<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhaar QR Code Generator</title>
    <!-- QRCode.js for generating QR Codes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2563eb;
            --background-color: #f8fafc;
            --text-color: #0f172a;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0;
        }

        .download-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s ease;
        }

        .download-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        /* Container for the PDF generation to ensure formatting */
        #pdf-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            max-width: 800px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            page-break-inside: avoid;
        }

        td {
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            vertical-align: middle;
            width: 50%;
        }

        .cell-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .text-details {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .family-id {
            color: #475569;
        }
        
        .aadhaar-num {
            font-weight: 600;
            font-size: 1.2rem;
            margin: 0.25rem 0;
        }
        
        .name {
            color: #334155;
            font-weight: 500;
        }

        .qr-code {
            padding: 0.5rem;
            background: white;
            border-radius: 4px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .header, .download-btn {
                display: none;
            }
            #pdf-container {
                box-shadow: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Aadhaar QR Code Dashboard</h1>
        <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div id="pdf-container">
        <table id="qr-table">
            <!-- Table content will be injected by JavaScript -->
        </table>
    </div>

    <script>
        const aadhaarData = [];
        for (let i = 1; i <= 100; i++) {
            const randomAadhaar = "3000" + Math.floor(10000000 + Math.random() * 90000000);
            aadhaarData.push({
                aadhaar: randomAadhaar,
                name: "Name " + i,
                surname: "Surname " + i,
                fatherName: "Father " + i,
                gender: i % 2 === 0 ? "Female" : "Male"
            });
        }

        function generateTable() {
            const table = document.getElementById('qr-table');
            let tableHTML = '';
            
            for (let i = 0; i < aadhaarData.length; i += 2) {
                const item1 = aadhaarData[i];
                const item2 = aadhaarData[i+1];
                
                tableHTML += '<tr>';
                
                // First column
                if (item1) {
                    tableHTML += `
                        <td>
                            <div class="cell-content">
                                <div class="text-details">
                                    <div class="aadhaar-num">${item1.aadhaar}</div>
                                    <div class="name">Name: ${item1.name} ${item1.surname}</div>
                                    <div class="family-id">D/O, S/O: ${item1.fatherName}</div>
                                    <div class="family-id">Gender: ${item1.gender}</div>
                                </div>
                                <div id="qr-${i}" class="qr-code"></div>
                            </div>
                        </td>
                    `;
                } else {
                    tableHTML += '<td></td>';
                }

                // Second column
                if (item2) {
                    tableHTML += `
                        <td>
                            <div class="cell-content">
                                <div class="text-details">
                                    <div class="aadhaar-num">${item2.aadhaar}</div>
                                    <div class="name">Name: ${item2.name} ${item2.surname}</div>
                                    <div class="family-id">D/O, S/O: ${item2.fatherName}</div>
                                    <div class="family-id">Gender: ${item2.gender}</div>
                                </div>
                                <div id="qr-${i+1}" class="qr-code"></div>
                            </div>
                        </td>
                    `;
                } else {
                    tableHTML += '<td></td>';
                }

                tableHTML += '</tr>';
            }
            
            table.innerHTML = tableHTML;
            
            // Generate QR Codes after HTML is injected
            aadhaarData.forEach((item, index) => {
                const qrText = `Aadhaar: ${item.aadhaar} | Name: ${item.name} ${item.surname} | S/O: ${item.fatherName} | Gender: ${item.gender}`;
                new QRCode(document.getElementById(`qr-${index}`), {
                    text: qrText,
                    width: 150,
                    height: 150,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            });
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-container');
            const opt = {
                margin:       10,
                filename:     'Aadhaar_QR_Codes.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Using html2pdf library
            html2pdf().set(opt).from(element).save();
        }

        // Initialize table on load
        window.onload = generateTable;
    </script>
</body>
</html>
