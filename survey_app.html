<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Katarusum</title>
    <!-- Include html5-qrcode for scanning -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary-color: #00695c;
            /* App Header Green */
            --secondary-color: #0288d1;
            /* Button Blue */
            --text-color: #333333;
            --label-color: #666666;
            --border-color: #999999;
            --error-color: #d32f2f;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        /* Header Style */
        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 500;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
        }

        .info-btn {
            font-size: 24px;
            border: 2px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Container */
        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            min-height: calc(100vh - 60px);
        }

        /* Scanner Button */
        .scan-container {
            background-color: var(--secondary-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            color: white;
            cursor: pointer;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .scan-icon {
            background: white;
            padding: 8px;
            border-radius: 8px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-icon img {
            width: 100%;
        }

        .scan-text {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
        }

        /* Scanner View */
        #reader {
            width: 100%;
            margin-bottom: 24px;
            display: none;
            /* Hidden until button is clicked */
            border-radius: 12px;
            overflow: hidden;
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 32px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: var(--label-color);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-group label span {
            color: var(--error-color);
        }

        .form-group input[type="text"] {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 8px 0;
            font-size: 16px;
            outline: none;
            background: transparent;
        }

        .form-group input[type="text"]:focus {
            border-bottom: 2px solid var(--secondary-color);
        }

        .form-note {
            color: #7b1fa2;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Radio Buttons */
        .radio-group-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .radio-group-container label.group-title {
            margin: 0;
        }

        .radio-options {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <span class="back-btn">&#8592;</span>
            <span>Create a Registaration</span>
        </div>
        <div class="info-btn">i</div>
    </div>

    <div class="container">

        <div class="scan-container" id="start-scan-btn">
            <div class="scan-icon">
                <svg viewBox="0 0 24 24" fill="black" width="40" height="40">
                    <path
                        d="M3 3h6v6H3V3m2 2v2h2V5H5m8-2h6v6h-6V3m2 2v2h2V5h-2M3 13h6v6H3v-6m2 2v2h2v-2H5m13-2h2v2h-2v-2m-4 0h2v2h-2v-2m0 4h2v2h-2v-2m4-2h2v2h-2v-2m-4 4h6v2h-6v-2m-2-6h2v6h-2v-6Z" />
                </svg>
            </div>
            <div class="scan-text">Click here to<br>Scan QR code on<br>Aadhaar card</div>
        </div>

        <div id="reader"></div>

        <div class="form-group">
            <label>Aadhaar Number <span>*</span></label>
            <input type="text" id="aadhaar" readonly>
        </div>

        <div class="form-group">
            <label>Name <span>*</span></label>
            <input type="text" id="name" readonly>
        </div>

        <div class="form-group">
            <label>Surname <span>*</span></label>
            <input type="text" id="surname" readonly>
        </div>

        <div class="form-group">
            <label style="color: var(--secondary-color);">Father/Spouse Name <span>*</span></label>
            <input type="text" id="fatherName" style="border-bottom: 2px solid var(--secondary-color);" readonly>
        </div>

        <div class="form-group">
            <label>Date of Birth <span>*</span></label>
            <input type="text" id="dob" readonly>
            <div class="form-note">Note : Owner must be atleast 18 years old</div>
        </div>

        <div class="form-group radio-group-container">
            <label class="group-title">Gender <span>*</span></label>
            <div class="radio-options">
                <label class="radio-option">
                    <input type="radio" name="gender" value="Male" disabled> Male
                </label>
                <label class="radio-option">
                    <input type="radio" name="gender" value="Female" disabled> Female
                </label>
                <label class="radio-option">
                    <input type="radio" name="gender" value="Others" disabled> Others
                </label>
            </div>
        </div>

    </div>

    <script>
        let html5QrcodeScanner = null;

        document.getElementById('start-scan-btn').addEventListener('click', () => {
            const readerDiv = document.getElementById('reader');
            readerDiv.style.display = 'block';

            // Initialize Scanner
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false
                );
            }

            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        });

        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Scan result: ${decodedText}`);

            try {
                let data = {};
                // Handle plain text format: Aadhaar: 123 | Name: First Last | S/O: Father | DOB: 01/01/90 | Gender: Male
                if (decodedText.includes('|')) {
                    const parts = decodedText.split('|');
                    parts.forEach(part => {
                        const [key, ...valueParts] = part.trim().split(':');
                        const value = valueParts.join(':').trim();
                        if (key.includes('Aadhaar')) data.aadhaar = value;
                        if (key.includes('Name')) {
                            const nameParts = value.split(' ');
                            data.surname = nameParts.pop();
                            data.name = nameParts.join(' ');
                        }
                        if (key.includes('S/O') || key.includes('D/O')) data.fatherName = value;
                        if (key.includes('DOB')) data.dob = value;
                        if (key.includes('Gender')) data.gender = value;
                    });
                } else {
                    data = JSON.parse(decodedText); // fallback
                }

                // Auto-fill form fields
                if (data.aadhaar) document.getElementById('aadhaar').value = data.aadhaar;
                if (data.name) document.getElementById('name').value = data.name;
                if (data.surname) document.getElementById('surname').value = data.surname;
                if (data.fatherName) document.getElementById('fatherName').value = data.fatherName;
                if (data.dob) document.getElementById('dob').value = data.dob;

                // Set Gender Radio
                if (data.gender) {
                    const radios = document.getElementsByName('gender');
                    for (let radio of radios) {
                        if (radio.value === data.gender) {
                            radio.checked = true;
                            break;
                        }
                    }
                }

                // Stop scanner
                html5QrcodeScanner.clear().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    alert("Aadhaar Data successfully captured!");
                });

            } catch (e) {
                console.error("Invalid QR Code Format", e);
                alert("Invalid QR Code. Please scan a valid JSON Aadhaar QR Code.");
                // Stop scanner
                html5QrcodeScanner.clear().then(() => {
                    document.getElementById('reader').style.display = 'none';
                });
            }
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning
            // console.warn(`Code scan error = ${error}`);
        }
    </script>

</body>

</html>
